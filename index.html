<!-- index.html (FULL REPLACE MAIN v49 - parked horse size + Full Preview fills grey space) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#e9e9ea"/>
  <title>Song Rider Pro</title>
  <link rel="manifest" href="./manifest.webmanifest?v=62">
  <style>
    :root{
    --horseRunH: 74px;   /* running GIF size */
--horseParkH: 120px;  /* parked horse size */


      --bg:#e9e9ea;
      --card:#ffffff;
      --ink:#151515;
      --muted:#666;
      --shadow: 0 10px 24px rgba(0,0,0,.10);
      --radius:16px;

      --beatHL:#ffd54a;

       --hiYellow:#ffeb3b; /* highlighter yellow */

      --noteBlue:#5CE1FF;
      --lyricPink:#FF5FB8;
      --backbeatGreen:#86EFAC;

      --dangerRed:#dc2626;

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;

      /* ✅ OFFLINE title font (no internet needed) */
      --titleFont: Impact, Haettenschweiler, "Arial Black", "Franklin Gothic Heavy", var(--sans);

      /* ✅ ONE source of truth for horse height (GIF + parked horse) */
      --horseH: 130px;

      /* ✅ gets set by the tiny script below */
      --headerH: 160px;
    }

    *, *::before, *::after{ box-sizing:border-box; }

    /* ✅ IMPORTANT: flex page so main can fill screen */
    html, body{ height:100%; }
    body{
      margin:0;
      font-family:var(--sans);
      background:var(--bg);
      color:var(--ink);
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }

    header{
      position:sticky; top:0; z-index:51;
      background:linear-gradient(#efeff1, #e9e9ea);
      border-bottom:1px solid rgba(0,0,0,.08);
      padding:10px 12px 10px;
    }

    /* ✅ HORSE RUNNER LAYER (fixed, pointer-events none) */
    .horseWrap{
      position:fixed;
      left:0; right:0;
      top:6px;
     height:var(--horseRunH);
      z-index:120;
      pointer-events:none;
      overflow:visible;
    }
    .horseWrap img{
      position:absolute;
      top:0;
     height:var(--horseRunH);
      width:auto;
      display:none;
      will-change:transform;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.18));
    }

    @keyframes horseRunRight{
      from{ transform: translateX(-180px); }
      to{ transform: translateX(calc(100vw + 180px)); }
    }
    @keyframes horseRunLeft{
      from{ transform: translateX(calc(100vw + 180px)); }
      to{ transform: translateX(-180px); }
    }

    .horseRunRight{
      left:0;
      animation-name: horseRunRight;
      animation-timing-function: linear;
      animation-fill-mode: both;
    }
    .horseRunLeft{
      left:0;
      animation-name: horseRunLeft;
      animation-timing-function: linear;
      animation-fill-mode: both;
    }

    .panel{
      margin-top:0;
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      border:1px solid rgba(0,0,0,.06);
      overflow:hidden;
    }
    .panelTop{
       position:relative;
      padding:10px 12px;
      border-bottom:1px solid rgba(0,0,0,.06);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }

    /* ✅ OFFLINE TITLE STYLE + MULTI-COLOR OUTLINE */
    .panelTop .left{
      font-family: var(--titleFont);
      font-weight: 900;
      font-size: 24px;
      letter-spacing: 1.0px;
      line-height: 1;
      display:flex;
      align-items:baseline;
      gap:6px;
      text-transform: uppercase;
    }

.panelTop .left span{
  text-shadow:
    /* thin black outline */
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000,

    /* existing SRP color pop */
    -1px  0   var(--noteBlue),
     1px  0   var(--lyricPink),
     0    1px var(--backbeatGreen),
     0   -1px var(--backbeatGreen),
     0    2px rgba(0,0,0,.10);
}
    .srp-pink{ color: var(--lyricPink); }
    .srp-blue{ color: var(--noteBlue); }
    .srp-green{ color: var(--backbeatGreen); }

    /* ✅ Parked horse: same height as GIF horse */
 #horseParked{
  position:absolute;
  right:90px;
  top:-15px;              /* stays in title row */
  height:var(--horseParkH);
  width:auto;
  display:block;
  pointer-events:none;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,.10));
}


    .miniBar{ display:none; padding:10px 12px; border-bottom:1px solid rgba(0,0,0,.06); }
    .miniBar.show{ display:block; }

    #panelBody{ max-height:28vh; overflow:auto; -webkit-overflow-scrolling: touch; }
    #panelBody.hidden{ display:none; }

    .row{
      padding:10px 12px;
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:nowrap;
      overflow-x:hidden;
    }
.row.nowrap{
  flex-wrap:nowrap;
  overflow:hidden;
  gap:6px;
  min-width:0;                 /* 🔥 allows shrinking */
}
   /* ✅ allow children in the top header row to shrink instead of pushing Key off-screen */
#panelBody .row.nowrap > *{ min-width:0; }
#topControlsRow{ gap:4px !important; }
#topControlsRow .miniIconBtn{ width:32px; height:32px; font-size:14px; }
#cloudSyncBtn{ font-size:13px; }

#panelBody .row.nowrap > *{
  min-width:0;
}
    .pill{
      border:1px solid #111;
      background:#111;
      border-radius:999px;
      padding:7px 9px;
      font-weight:1100;
      font-size:13px;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      height:34px;
      flex:0 0 auto;
      color:#fff;
    }
    .pill.active{
      background:#16a34a;
      border-color:#16a34a;
      color:#fff;
    }

    .instIconBtn{
      min-width:60px;
      padding:7px 0;
      font-size:20px;
      line-height:1;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .tinyBtn{
      border:1px solid rgba(0,0,0,.12);
      background:transparent;
      border-radius:12px;
      padding:7px 9px;
      font-weight:1100;
      font-size:13px;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      height:34px;
      flex:0 0 auto;
      color:#111;
      min-width:34px;
      text-align:center;
    }
    .tinyBtn.active{ background:#111; color:#fff; border-color:#111; }

    .exportBtn{
      width:34px; height:34px;
      border-radius:999px;
      display:flex; align-items:center; justify-content:center;
      border:1px solid rgba(0,0,0,.12);
      background:transparent;
      font-size:16px;
      flex:0 0 auto;
      cursor:pointer;
      user-select:none;
      line-height:1;
      padding:0;
      color:#111;
    }

    .tinyField input{
      width:70px;
      padding:7px 8px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.12);
      background:transparent;
      font-size:13px;
      outline:none;
      height:34px;
      text-align:center;
    }
/* ✅ BPM pill with tiny label inside (label + input share one capsule) */
 .tinyCombo{
  display:flex;
  align-items:center;
  gap:4px;
  height:32px;
  padding:0 6px;                 /* ✅ compact */
  border-radius:12px;
  border:1px solid rgba(0,0,0,.12);
  background:transparent;
  flex:0 0 auto;
}

.tinyCombo .tinyLbl{
  font-size:10px;
  font-weight:1100;
  letter-spacing:.4px;
  color:#666;
  line-height:1;
  user-select:none;
}

/* ✅ hard-force compact BPM input */
#bpmInput{
  width:34px !important;
  min-width:34px !important;
  max-width:34px !important;
  height:32px;
  border:none;
  outline:none;
  background:transparent;
  padding:0;
  font-size:13px;
  text-align:center;
  -webkit-appearance:none;
  appearance:none;
}

 .tinyCombo input{
  width:34px;            /* ✅ keeps it compact so the row doesn’t squish */
  height:32px;
  border:none;
  outline:none;
  background:transparent;
  padding:0;
  font-size:13px;
  text-align:center;
  -webkit-appearance:none;
  appearance:none;
}

 .tinyField.key input{
  width:50px;
  min-width:0;                /* 🔥 critical */
  padding-left:0;
 }
    
@media (min-width: 420px){
  .tinyField.key input{ width:72px; }  /* ✅ a little bigger on wider phones */
}

    .tinyField input[readonly]{ background:#f6f6f7; }

    .btn{
      border:none;
      border-radius:12px;
      padding:9px 11px;
      font-weight:1100;
      background:#111827;
      color:#fff;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      height:34px;
      flex:0 0 auto;
    }
    .btn.secondary{
      background:transparent;
      color:#111;
      border:1px solid rgba(0,0,0,.12);
    }
    .btn.rec{ background:var(--dangerRed); }

    .iconCircle{
      width:34px; height:34px;
      border-radius:999px;
      display:flex; align-items:center; justify-content:center;
      border:1px solid rgba(0,0,0,.12);
      background:transparent;
      font-size:16px;
      flex:0 0 auto;
      cursor:pointer;
      user-select:none;
      line-height:1;
    }

    .iconCircle.scrollCircle{
      background:#111;
      border-color:#111;
      color:#fff;
      font-weight:1300;
      font-size:16px;
    }
    .iconCircle.scrollCircle.on{
      background:#16a34a;
      border-color:#16a34a;
      color:#fff;
    }

    .iconCircle.recCircle{
      background: var(--dangerRed);
      border-color: var(--dangerRed);
      position:relative;
      font-size:0;
      color:transparent;
      overflow:hidden;
      text-indent:-9999px;
    }
    .iconCircle.recCircle::before{
      content:"●";
      font-size:16px;
      color:#fff;
      line-height:1;
      text-indent:0;
    }
    .iconCircle.recCircle.recording::before{
      content:"■";
      font-size:15px;
    }

    .tabs{ display:none; }
    
.miniIconBtn{
  width:34px; height:34px;
  border-radius:999px;
  display:flex; align-items:center; justify-content:center;
  border:1px solid rgba(0,0,0,.12);
  background:transparent;
  font-size:16px;
  flex:0 0 auto;
  cursor:pointer;
  user-select:none;
  line-height:1;
}
.miniIconBtn:active{ transform:scale(0.98); }

    /* ✅ main MUST be flex:1 so it fills below header */
    main{
      padding:12px 12px 110px;
      max-width:1100px;
      margin:0 auto;
      width:100%;
      flex:1;
      display:flex;
      min-height:0;
    }

    /* ✅ sheet fills remaining viewport height */
    .sheet{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      border:1px solid rgba(0,0,0,.06);
      overflow:hidden;
       position:relative;

      flex:1;
      display:flex;
      flex-direction:column;
      min-height:calc(100vh - var(--headerH) - 24px);
    }
    
.sheetHeader{
  /* ✅ stays pinned to the TOP of the LOWER scroll panel (#sheetBody) */
  position: sticky;
  top: 0;
  z-index: 5;

  padding:10px 12px;
  background: var(--card);
  border-bottom:1px solid rgba(0,0,0,.06);
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  flex-wrap:nowrap;
}
   
    .sheetHeader h2{ margin:0; font-size:13px; font-weight:1100; letter-spacing:.3px; }
    .hint{ font-size:11px; color:var(--muted); font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* ✅ We render the Full-page hint INSIDE the title bar now. Hide the external slot. */
    #sheetHint{ display:none; }


    /* =========================
       Song Part title pills (Full breaks + page heading)
    ========================= */
    .fullBreakPills{
      padding:12px 12px 2px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .breakRow{
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      padding:2px 0;
    }

    .breakActions{
      position:absolute;
      left:0;
      right:0;
      display:flex;
      justify-content:center;
      gap:10px;
      padding:2px 0;
      pointer-events:auto;
    }
    .breakActBtn{
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.18);
      background:rgba(255,255,255,.92);
      font-size:18px;
      font-weight:900;
      line-height:1;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 6px 14px rgba(0,0,0,.08);
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .breakActBtn:active{ transform: translateY(1px); }

    .breakRow::before,
    .breakRow::after{
      content:"";
      height:2px;
      background:rgba(0,0,0,.18);
      flex:1 1 auto;
      border-radius:999px;
    }
    .breakRow::before{ margin-right:10px; }
    .breakRow::after{ margin-left:10px; }

    /* ✅ Full-page break pills should be shorter (about half the prior length) */
    input.songPartPill{
  width:min(220px, 34vw);
  max-width:340px;
  height:34px;
  border-radius:999px;
  border:1px solid rgba(0,0,0,.22);
  background:var(--hiYellow);
  padding:6px 12px;
  font-weight:900;
  font-size:15px;
  outline:none;
  text-align:center;
  box-shadow: 0 8px 18px rgba(0,0,0,.08);
  font-family:var(--sans);
    }
    input.songPartPill::placeholder{
      color:#7a7a7a;
      font-weight:1000;
    }
    /* page header title input uses the same pill, but left-aligned */
    input.songPartPill.headingPill{
      text-align:left;
      box-shadow:none;
      width:min(520px, 72vw);
      max-width:620px;
    }

    /* ✅ Overlay pills that sit INSIDE the Full textarea */
    .fullPillHost{ position:relative; }
    .fullPillOverlay{
      position:absolute;
      left:0; right:0;
      top:0; bottom:0;
      pointer-events:none;
      overflow:hidden;
    }
    .fullPillOverlay .breakRow{
      position:absolute;
      left:12px;
      right:12px;
      pointer-events:none;
      z-index:5;
    }
    .fullPillOverlay .breakRow::before,
    .fullPillOverlay .breakRow::after{ background:rgba(0,0,0,.14); }
    .fullPillOverlay input.songPartPill{ pointer-events:auto; }

    /* ===== Full Page (section blocks) ===== */
 .fullSectionEditor{
  display:flex;
  flex-direction:column;
  gap:24px;
  padding:16px 12px 52vh; /* keyboard-safe bottom space for last full-view line */
  overflow-anchor:none;
  overscroll-behavior-y:contain;
}

/* REMOVE card look completely */
.fullSectionCard{
  border:none;
  background:transparent;
  box-shadow:none;
  padding:0;
  border-radius:0;
}
   .fullSectionHead{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  margin:10px 0 6px;
} 
 .fullSectionHead .fullBreakLine{
  flex:1;
  height:2px;
  background:#d9d9d9;
  border-radius:99px;
}
    .fullSectionHead input.songPartPill{
      flex:0 1 52%;
      max-width:520px;
    }
   textarea.fullSectionText{
  width:100%;
  min-height:160px;
  height:auto;
  resize:none;
  overflow:hidden;
  border:none;
  border-radius:0;
  padding:0 4px 14px;
  box-sizing:border-box;
  font-size:18px;
  font-weight:900;
  line-height:1.5;
  background:transparent;
  outline:none;
  scroll-margin-bottom:24px;
  overflow-anchor:none;
}
    textarea.fullSectionText:focus{
      border-color:rgba(0,0,0,.22);
      box-shadow:0 0 0 3px rgba(255,235,59,.25);
    }
  .fullSectionActions{
  display:flex;
  justify-content:center;
  gap:16px;
  margin:14px 0 0;
}

    /* Ensure + / × controls sit above textarea text as well */
    .fullPillOverlay .breakActions{ z-index:6; }

    .sheetActions{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:nowrap;
    }

   /* ✅ sheetBody must stretch AND SCROLL */
#sheetBody{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;

  overflow:auto;                 /* ✅ THIS fixes “frozen cards” */
  -webkit-overflow-scrolling:touch;
  overflow-anchor:none;
  overscroll-behavior-y:contain;
}
/* ✅ Full page layout: make the render target a flex child */
#sheetInner{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
}

    .cards{
  padding:0 12px 140px;  /* ✅ more room at bottom */
  display:flex;
  flex-direction:column;
  gap:12px;
}


    .card{
  position:relative; /* ✅ for top-right X */
  border:1px solid rgba(0,0,0,.10);
  border-radius:14px;
  background:transparent;
  padding: 10px;
  scroll-margin-top: 210px;
    }
.cardDel,
.cardAdd{
  position:static;
  width:30px;
  height:30px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,.14);
  background:transparent;
  font-size:18px;
  font-weight:1100;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  user-select:none;
  padding:0;
}
.cardDel:active,
.cardAdd:active{
  transform:scale(0.98);
}


    .cardTop{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:8px;
}
.cardTopLeft{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1 1 auto;
  min-width:0;
}
.cardTopRight{
  display:flex;
  align-items:center;
  gap:8px;
  flex:0 0 auto;
}

    .cardNum{
      font-weight:1100;
      font-size:12px;
      background:transparent;
      border:1px solid rgba(0,0,0,.12);
      border-radius:999px;
      padding:6px 10px;
      min-width:40px;
      text-align:center;
      cursor:pointer;
      user-select:none;
    }
   .syllPill{
  font-weight:1100;
  font-size:12px;

  padding:6px 10px;
  border-radius:999px;

  /* ✅ WHITE PILL BASE */
  background:#ffffff;
  color:#111;
  border:1px solid rgba(0,0,0,.14);
  max-width:100%;
  box-shadow:none;
}

/* ✅ Glow Bands */
.syllPill.sylRed{
  border-color:rgba(220,38,38,.55);
  box-shadow:0 0 0 2px rgba(220,38,38,.20),
             0 0 18px rgba(220,38,38,.32);
}

.syllPill.sylYellow{
  border-color:rgba(234,179,8,.60);
  box-shadow:0 0 0 2px rgba(234,179,8,.20),
             0 0 18px rgba(234,179,8,.30);
}

.syllPill.sylGreen{
  border-color:rgba(34,197,94,.55);
  box-shadow:0 0 0 2px rgba(34,197,94,.18),
             0 0 18px rgba(34,197,94,.28);
}

    .notesRow{
      display:grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap:6px;
      margin-bottom:8px;
    }
    .noteCell{
      border-radius:10px;
      border:1px solid rgba(0,0,0,.18);
      background:var(--noteBlue);
      padding:8px 6px;
      font-family:var(--mono);
      font-size:12px;
      text-align:center;
      outline:none;
      height:34px;
      -webkit-appearance:none;
      appearance:none;
    }

    textarea.lyrics{
      width:100%;
      resize:vertical;
      min-height:46px;
      max-height:180px;
      padding:10px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.18);
      font-size:14px;
      font-weight:900 !important;
      outline:none;
      background:var(--lyricPink);
      color:#111;
      font-weight:900;
      margin-bottom:10px;
    }

    /* ✅ Make ALL lower-window editable boxes bold */
    .cards textarea,
    .cards input.noteCell{
      font-weight:900;
      font-weight:900 !important;
    }

    .beatsRow{
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap:10px;
    }
    textarea.beatCell{
      width:100%;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.14);
      background:transparent;
      padding:10px 8px;
      font-weight:900 !important;
      font-family:var(--mono);
      font-size:14px;
      font-weight:900;
      text-align:center;
      outline:none;
      min-height: 78px;
      line-height:1.15;
      resize:none;
      overflow:hidden;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .beatsRow textarea.beatCell:nth-child(2),
    .beatsRow textarea.beatCell:nth-child(4){
      background:var(--backbeatGreen);
    }

    .tick{
      box-shadow: 0 0 0 6px rgba(255,213,74,.92) inset, 0 0 0 2px rgba(0,0,0,.10);
      outline: none;
      border-radius: 14px;
    }

    /* ✅ Beat Sheet Pro style: bright yellow flash INSIDE the box on each tick (border stays) */
    @keyframes tickFillFlash{
      0%{ background-color: rgba(255,213,74,.95); filter: brightness(1.25); }
      100%{ background-color: transparent; filter: brightness(1); }
    }

    /* ✅ 16th-note pulse (4 flashes per beat) */
    @keyframes tickFillFlash16{
      0%{ background-color: rgba(255,235,59,0.0); }
      12%{ background-color: rgba(255,235,59,0.85); }
      25%{ background-color: rgba(255,235,59,0.0); }
      37%{ background-color: rgba(255,235,59,0.85); }

<script>
(() => {
  const root = document.documentElement;
  const header = document.querySelector("header");
  if(!header) return;

  let raf = 0;
  const syncHeaderH = () => {
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => {
      const h = Math.ceil(header.getBoundingClientRect().height || 0);
      root.style.setProperty("--headerH", h + "px");
    });
  };

  // initial
  syncHeaderH();

  // keep updated
  window.addEventListener("resize", syncHeaderH, { passive:true });

  // updates after Show/Hide toggles
  const toggleBtn = document.getElementById("togglePanelBtn");
  if(toggleBtn){
    toggleBtn.addEventListener("click", () => {
      // wait for DOM/layout to settle, then measure
      setTimeout(syncHeaderH, 0);
      setTimeout(syncHeaderH, 60);
    });
  }

  // observe header size changes (covers dynamic rows showing/hiding)
  if("ResizeObserver" in window){
    const ro = new ResizeObserver(syncHeaderH);
    ro.observe(header);
  }else{
    const mo = new MutationObserver(syncHeaderH);
    mo.observe(header, { attributes:true, childList:true, subtree:true });
  }
})();
</script>
